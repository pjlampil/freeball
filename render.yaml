services:
  - type: web
    name: freeball
    runtime: docker
    plan: free
    healthCheckPath: /up
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: freeball-db
          property: connectionString
      - key: RAILS_LOG_TO_STDOUT
        value: "1"

databases:
  - name: freeball-db
    plan: free
    databaseName: freeball
    user: freeball
